<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Search — Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"
          integrity="sha384-e6nUZLBkQ86NJ6TVVKAeSaK8jWa3NhkYWZFomE39AvDbQWeie9PlQqM3pmYW5d1g"
          crossorigin="anonymous"></script>
  <style>
    :root {
      --bg:      #0f172a;
      --surface: #1e293b;
      --border:  #334155;
      --text:    #f1f5f9;
      --muted:   #94a3b8;
      --blue:    #3b82f6;
      --green:   #22c55e;
      --yellow:  #eab308;
      --red:     #ef4444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      padding: 28px 32px;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 28px;
    }
    h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.01em; }
    #meta { color: var(--muted); font-size: 12px; margin-top: 4px; }

    button {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: color 0.15s, border-color 0.15s;
    }
    button:hover { color: var(--text); border-color: var(--muted); }
    button:disabled { opacity: 0.5; cursor: default; }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
    }
    .card-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 16px;
    }

    /* ── Stat cards ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }
    .stat-value { font-size: 30px; font-weight: 700; line-height: 1; margin-bottom: 6px; }
    .stat-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }
    .stat-sub   { font-size: 12px; color: var(--muted); }
    .duration-val { color: var(--green); }
    .rate-val     { color: var(--blue); }

    /* ── Chart row ── */
    .charts-row {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 14px;
      margin-bottom: 20px;
    }
    .chart-wrap { position: relative; height: 210px; }

    .legend {
      display: flex;
      gap: 14px;
      margin-top: 10px;
    }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
    .legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

    /* ── Bottom row ── */
    .bottom-row {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 14px;
    }

    /* ── Salary ── */
    .salary-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 14px;
      text-align: center;
    }
    .salary-stat-val   { font-size: 16px; font-weight: 700; color: var(--blue); }
    .salary-stat-label { font-size: 10px; color: var(--muted); margin-top: 2px; }
    .salary-wrap { position: relative; height: 150px; }

    /* ── Table ── */
    .table-scroll { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      white-space: nowrap;
      user-select: none;
    }
    th:hover { color: var(--text); }
    th.sorted { color: var(--text); }
    td {
      padding: 9px 12px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.025); }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
    }
    .badge-applied   { background: rgba(34,197,94,0.12);   color: var(--green); }
    .badge-declined  { background: rgba(148,163,184,0.08); color: var(--muted); }
    .badge-pulledout { background: rgba(234,179,8,0.12);   color: var(--yellow); }
    .stage-tag {
      display: inline-block;
      margin-left: 6px;
      font-size: 10px;
      color: var(--blue);
      background: rgba(59,130,246,0.12);
      padding: 1px 6px;
      border-radius: 3px;
    }

    a { color: var(--blue); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Grid item overflow fix ──
       Grid children default to min-width:auto, letting them grow wider than
       their track. Setting min-width:0 forces them to respect the track width
       so overflow-x:auto on .table-scroll actually contains the table. */
    .charts-row > .card,
    .bottom-row  > .card { min-width: 0; }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      body { padding: 16px; }

      .stats-row  { grid-template-columns: repeat(2, 1fr); }
      .charts-row { grid-template-columns: 1fr; }
      .bottom-row { grid-template-columns: 1fr; }

      .stat-value { font-size: 24px; }
      .legend     { flex-wrap: wrap; gap: 10px; }
    }

    /* ── Skeleton loader ── */
    @keyframes skeleton-shimmer {
      0%   { background-position:  200% 0; }
      100% { background-position: -200% 0; }
    }
    .skeleton-block {
      display: inline-block;
      height: 1em;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--border) 25%, #475569 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: skeleton-shimmer 1.5s ease-in-out infinite;
      vertical-align: middle;
    }
    body.is-loading .chart-wrap {
      background: linear-gradient(90deg, var(--surface) 25%, var(--border) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: skeleton-shimmer 1.5s ease-in-out infinite;
      border-radius: 4px;
    }

    /* ── States ── */
    .empty { color: var(--muted); font-size: 12px; padding: 8px 0; }
    #error-banner {
      display: none;
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.3);
      color: var(--red);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 20px;
      font-size: 13px;
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Job Search Dashboard</h1>
    <div id="meta">Loading…</div>
  </div>
</header>

<div id="error-banner"></div>

<!-- Stat cards -->
<div class="stats-row">
  <div class="card">
    <div class="stat-label">Total Applied</div>
    <div class="stat-value" id="s-total">—</div>
    <div class="stat-sub" id="s-last">—</div>
  </div>
  <div class="card">
    <div class="stat-label">Active</div>
    <div class="stat-value" id="s-active">—</div>
    <div class="stat-sub" id="s-closed">— closed</div>
  </div>
  <div class="card">
    <div class="stat-label">Search Duration</div>
    <div class="stat-value duration-val" id="s-duration">—</div>
    <div class="stat-sub" id="s-duration-sub">First to last application</div>
  </div>
  <div class="card">
    <div class="stat-label">Interview Rate</div>
    <div class="stat-value rate-val" id="s-rate">—</div>
    <div class="stat-sub" id="s-rate-sub">— with conversations</div>
  </div>
</div>

<!-- Charts -->
<div class="charts-row">
  <div class="card">
    <div class="card-title">Weekly Applications</div>
    <div class="chart-wrap"><canvas id="chart-weekly"></canvas></div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>≥ 3</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--yellow)"></div>= 2</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>= 1</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--border)"></div>0</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Stage Funnel</div>
    <div class="chart-wrap"><canvas id="chart-funnel"></canvas></div>
  </div>
</div>

<!-- Salary + Table -->
<div class="bottom-row">
  <div class="card">
    <div class="card-title">Applications</div>
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th onclick="sortBy('company')">Company</th>
            <th onclick="sortBy('role')">Role</th>
            <th onclick="sortBy('date')">Applied on</th>
            <th onclick="sortBy('cw')">CW</th>
            <th onclick="sortBy('status')">Status</th>
            <th id="th-salary" onclick="sortBy('salary')">Salary</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
  <div class="card" id="salary-card">
    <div class="card-title">Salary Anchoring</div>
    <div class="salary-stats" id="salary-stats">
      <div class="empty">No salary data yet</div>
    </div>
    <div class="salary-wrap"><canvas id="chart-salary"></canvas></div>
  </div>
</div>

const SNAPSHOT_STAGES = {"Twint":{"stage":"R1","outcome":"rejected"},"Generali":{"stage":"R1","outcome":"rejected"},"Advertima":{"stage":"R1","outcome":"withdrawn"},"Wonderful AI":{"stage":"R3","outcome":"rejected"},"Entyre Group":{"stage":"R1","outcome":"rejected"},"Benetics AI":{"stage":"R1","outcome":"rejected","role":"Product Manager"},"Sygnum Bank":{"stage":"R4","outcome":"offer"},"Founderful":{"stage":"R1","outcome":"withdrawn"},"ELCA":{"stage":"R1","outcome":"rejected"},"Movec":{"stage":"R1","outcome":"withdrawn"},"localsearch":{"stage":"R1","outcome":"rejected","role":"Senior Product Owner AI Sales Agent / Sales-Tools"},"BRACK":{"stage":"R2","outcome":"withdrawn"}};

// Column header names from your Sheet (row 1)
const COL = {
  company: 'Company',
  role:    'Job',
  date:    'Applied on',
  status:  'Status',
  cw:      'Kalenderwoche',
  salary:  'Requested salary',
};

// Numeric rank of an interview round: R1->1, R2->2, … Rn->n; offer->high; else 0.
// Round-number-agnostic so R4+ loops render correctly (badge, funnel, rate).
function roundRank(stage) {
  const s = String(stage || '').toLowerCase();
  if (s === 'offer') return 100;
  const m = s.match(/^r(\d+)$/);
  return m ? parseInt(m[1], 10) : 0;
}

// Single source of truth for chart colors — keep in sync with the CSS :root vars
const COLORS = {
  green:  '#22c55e',
  yellow: '#eab308',
  red:    '#ef4444',
  blue:   '#3b82f6',
  border: '#334155',
  muted:  '#94a3b8',
};

let rows       = [];
let stages     = {};
let sortState  = { col: 'date', dir: 'desc' };
let charts     = {};

// ─── Data loading ─────────────────────────────────────────────────────────────

function loadData() {
  // Static retrospective — render directly from the embedded snapshot.
  stages = SNAPSHOT_STAGES;
  rows = SNAPSHOT_SHEET.data
    .map(r => ({
      company: String(r[COL.company] || '').trim(),
      role:    String(r[COL.role]    || '').trim(),
      jd_url:  /^https?:\/\//.test(r['jd_url'] || '') ? r['jd_url'] : null,
      date:    String(r[COL.date]    || '').trim(),
      status:  String(r[COL.status]  || '').toLowerCase().trim(),
      cw:      parseCW(r[COL.cw]),
      salary:  parseSalary(r[COL.salary]),
    }))
    .filter(r => r.company && r.date && r.status);

  render();
  setMeta(SNAPSHOT_META);
}

// ─── Helpers ──────────────────────────────────────────────────────────────────

function parseCW(val) {
  if (val === null || val === undefined || val === '') return 0;
  const n = parseInt(String(val).replace(/\D/g, ''), 10);
  return isNaN(n) ? 0 : n;
}

function parseSalary(val) {
  if (val === null || val === undefined || val === '') return null;
  const n = Number(val);
  return isNaN(n) || n === 0 ? null : n;
}

function currentCW() {
  const now = new Date();
  const d = new Date(Date.UTC(now.getFullYear(), now.getMonth(), now.getDate()));
  const day = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - day);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}

function fmtDay(d) {
  return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
}

function fmtSalary(n) {
  if (n === null || n === undefined) return '—';
  return 'CHF ' + Math.round(n) + 'k';
}

function setMeta(msg) { document.getElementById('meta').textContent = msg; }
function showError(msg) {
  const el = document.getElementById('error-banner');
  el.style.display = 'block';
  el.textContent = 'Error: ' + msg;
}
function hideError() { document.getElementById('error-banner').style.display = 'none'; }

// ─── Render ───────────────────────────────────────────────────────────────────

function render() {
  const cwNow = currentCW();

  // Group by CW, sorted by earliest date in group (handles year boundaries)
  const byCW = {};
  rows.forEach(r => {
    if (!r.cw) return;
    if (!byCW[r.cw]) byCW[r.cw] = { items: [], minDate: r.date };
    byCW[r.cw].items.push(r);
    if (!byCW[r.cw].minDate || r.date < byCW[r.cw].minDate)
      byCW[r.cw].minDate = r.date;
  });
  const sortedCWs = Object.keys(byCW)
    .map(Number)
    .sort((a, b) => byCW[a].minDate.localeCompare(byCW[b].minDate));

  // ── Stat cards ──────────────────────────────────────────────────────────────
  const total    = rows.length;
  const active   = rows.filter(r => r.status === 'applied').length;
  const closed   = rows.filter(r => r.status === 'declined' || r.status === 'pulled out').length;

  document.getElementById('s-total').textContent    = total;
  document.getElementById('s-active').textContent   = active;
  document.getElementById('s-closed').textContent   = `${closed} closed`;

  // Search duration: span from first to last application (search concluded — a
  // static retrospective, not a live streak). Last-applied date shown under Total.
  const appDates = rows.map(r => r.date).filter(Boolean).sort();
  if (appDates.length) {
    const first = new Date(appDates[0]);
    const last  = new Date(appDates[appDates.length - 1]);
    const weeks = Math.max(1, Math.round((last - first) / (7 * 86400000)) + 1);
    document.getElementById('s-duration').textContent = weeks + (weeks === 1 ? ' wk' : ' wks');
    document.getElementById('s-duration-sub').textContent = `${fmtDay(first)} – ${fmtDay(last)}`;
    document.getElementById('s-last').textContent = `Last applied ${fmtDay(last)}`;
  } else {
    document.getElementById('s-duration').textContent = '—';
    document.getElementById('s-last').textContent = '—';
  }

  // Interview rate — only count stage entries that (a) match an actual Sheet row
  // and (b) represent a real interview round (R1+). A non-round stage like
  // "Applied" or "Referral" is not a conversation and must not inflate the rate.
  // Warn on Sheet mismatches (usually a key typo, e.g. "Sygnum" vs "Sygnum Bank").
  const matchedStages = Object.keys(stages).filter(name => {
    const matched = rows.some(r => r.company === name);
    if (!matched) console.warn(`stages.json company "${name}" matches no Sheet row — key typo?`);
    return matched;
  });
  const progressed = matchedStages.filter(name =>
    roundRank(stages[name].stage)
  ).length;
  const rate = total > 0 ? Math.round((progressed / total) * 100) : 0;
  document.getElementById('s-rate').textContent    = rate + '%';
  document.getElementById('s-rate-sub').textContent =
    `${progressed} of ${total} with conversations`;

  renderWeeklyChart(sortedCWs, byCW, cwNow);
  renderFunnelChart(total);
  if (SHOW_SALARY) renderSalarySection();
  renderTable();
}

function renderWeeklyChart(sortedCWs, byCW, cwNow) {
  // Range: first to LAST application week (search concluded). Internal gap weeks
  // still show as 0-bars; we no longer trail empty weeks out to the current week.
  const minCW = sortedCWs.length > 0 ? Math.min(...sortedCWs) : cwNow;
  const maxCW = sortedCWs.length > 0 ? Math.max(...sortedCWs) : cwNow;
  const labels = [];
  const counts = [];
  const colors = [];

  for (let w = minCW; w <= maxCW; w++) {
    const count = (byCW[w]?.items || []).length;
    labels.push('CW ' + w);
    counts.push(count);
    colors.push(
      count >= 3 ? COLORS.green :
      count === 2 ? COLORS.yellow :
      count === 1 ? COLORS.red :
      COLORS.border
    );
  }

  if (charts.weekly) charts.weekly.destroy();
  charts.weekly = new Chart(document.getElementById('chart-weekly'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{ data: counts, backgroundColor: colors, borderRadius: 4 }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => `${ctx.raw} application${ctx.raw !== 1 ? 's' : ''}`,
          },
        },
      },
      scales: {
        x: {
          grid: { color: COLORS.border },
          ticks: { color: COLORS.muted, font: { size: 11 } },
        },
        y: {
          grid: { color: COLORS.border },
          ticks: { color: COLORS.muted, precision: 0, font: { size: 11 } },
          min: 0,
          suggestedMax: Math.max(4, ...counts),
        },
      },
    },
  });
}

function renderFunnelChart(total) {
  const stageCounts = { Applied: total, R1: 0, R2: 0, R3: 0, Offer: 0 };

  Object.values(stages).forEach(co => {
    const rank = roundRank(co.stage);
    if (rank >= 1) stageCounts.R1++;
    if (rank >= 2) stageCounts.R2++;
    if (rank >= 3) stageCounts.R3++;   // R4+ clears R3; funnel tops out at R3
    if (co.outcome === 'offer' || String(co.stage).toLowerCase() === 'offer') stageCounts.Offer++;
  });

  const stageLabels = ['Applied', 'R1', 'R2', 'R3', 'Offer'];
  const stageData   = stageLabels.map(s => stageCounts[s]);

  if (charts.funnel) charts.funnel.destroy();
  charts.funnel = new Chart(document.getElementById('chart-funnel'), {
    type: 'bar',
    data: {
      labels: stageLabels,
      datasets: [{
        data: stageData,
        backgroundColor: COLORS.blue,
        borderRadius: 4,
        barThickness: 22,
      }],
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: {
          grid: { color: COLORS.border },
          ticks: {
            color: COLORS.muted,
            font: { size: 11 },
            stepSize: 1,
            callback: v => Number.isInteger(v) ? v : '',
          },
          min: 0,
        },
        y: {
          grid: { display: false },
          ticks: { color: COLORS.muted, font: { size: 11 } },
        },
      },
    },
  });
}

function renderSalarySection() {
  const withSalary = rows
    .filter(r => r.salary !== null)
    .sort((a, b) => b.salary - a.salary);

  const el = document.getElementById('salary-stats');

  if (withSalary.length === 0) {
    el.innerHTML = '<div class="empty">No salary data yet</div>';
    if (charts.salary) { charts.salary.destroy(); charts.salary = null; }
    return;
  }

  const vals   = withSalary.map(r => r.salary).sort((a, b) => a - b);
  const min    = vals[0];
  const max    = vals[vals.length - 1];
  const mid    = Math.floor(vals.length / 2);
  const median = vals.length % 2 ? vals[mid] : (vals[mid - 1] + vals[mid]) / 2;

  el.innerHTML = `
    <div>
      <div class="salary-stat-val">${fmtSalary(min)}</div>
      <div class="salary-stat-label">Min asked</div>
    </div>
    <div>
      <div class="salary-stat-val">${fmtSalary(median)}</div>
      <div class="salary-stat-label">Median</div>
    </div>
    <div>
      <div class="salary-stat-val">${fmtSalary(max)}</div>
      <div class="salary-stat-label">Max asked</div>
    </div>
  `;

  if (charts.salary) charts.salary.destroy();
  charts.salary = new Chart(document.getElementById('chart-salary'), {
    type: 'bar',
    data: {
      labels: withSalary.map(r => r.company),
      datasets: [{
        data: withSalary.map(r => r.salary),
        backgroundColor: COLORS.blue,
        borderRadius: 3,
      }],
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: {
          grid: { color: COLORS.border },
          ticks: {
            color: COLORS.muted,
            font: { size: 10 },
            callback: v => fmtSalary(v),
          },
        },
        y: {
          grid: { display: false },
          ticks: { color: COLORS.muted, font: { size: 10 } },
        },
      },
    },
  });
}

function renderTable() {
  const sorted = [...rows].sort((a, b) => {
    let va = a[sortState.col] ?? '';
    let vb = b[sortState.col] ?? '';
    if (typeof va === 'string') va = va.toLowerCase();
    if (typeof vb === 'string') vb = vb.toLowerCase();
    if (va < vb) return sortState.dir === 'asc' ? -1 : 1;
    if (va > vb) return sortState.dir === 'asc' ? 1 : -1;
    return 0;
  });

  document.getElementById('tbody').innerHTML = sorted.map(r => {
    // A stage entry may pin to a specific role, so a second application to the
    // same company doesn't inherit the tag. No role = matches any row (back-compat).
    // Only badge real interview rounds (R1+) — never a stray "Applied"/"Referral".
    const stageEntry = stages[r.company];
    const rawStage = stageEntry && (!stageEntry.role || stageEntry.role === r.role)
      ? stageEntry.stage : '';
    const stage = roundRank(rawStage) ? rawStage : '';
    const roleCell = r.jd_url
      ? `<a href="${escHtml(r.jd_url)}" target="_blank" rel="noopener">${escHtml(r.role)}</a>`
      : escHtml(r.role);
    const stageBadge = stage
      ? `<span class="stage-tag">${escHtml(stage)}</span>`
      : '';
    const statusBadge =
      r.status === 'applied'    ? `<span class="badge badge-applied">Applied</span>` :
      r.status === 'declined'   ? `<span class="badge badge-declined">Declined</span>` :
      r.status === 'pulled out' ? `<span class="badge badge-pulledout">Withdrawn</span>` :
                                  `<span class="badge badge-declined">${escHtml(r.status)}</span>`;

    return `<tr>
      <td>${escHtml(r.company)}${stageBadge}</td>
      <td>${roleCell}</td>
      <td>${escHtml(r.date)}</td>
      <td>${r.cw ? 'CW ' + r.cw : '—'}</td>
      <td>${statusBadge}</td>
      ${SHOW_SALARY ? `<td>${fmtSalary(r.salary)}</td>` : ''}
    </tr>`;
  }).join('');

  // Update sorted-column highlight
  document.querySelectorAll('th').forEach(th => th.classList.remove('sorted'));
  const thIndex = ['company','role','date','cw','status','salary'].indexOf(sortState.col);
  const ths = document.querySelectorAll('th');
  if (thIndex >= 0 && ths[thIndex]) ths[thIndex].classList.add('sorted');
}

function sortBy(col) {
  sortState = sortState.col === col
    ? { col, dir: sortState.dir === 'asc' ? 'desc' : 'asc' }
    : { col, dir: 'asc' };
  renderTable();
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// Apply salary visibility mode
if (!SHOW_SALARY) {
  document.getElementById('salary-card').style.display = 'none';
  document.getElementById('th-salary').style.display = 'none';
  document.querySelector('.bottom-row').style.gridTemplateColumns = '1fr';
}

loadData();

// Resize all charts when tab visibility changes or container is resized
// (fixes funnel collapsing when browser sidebar is toggled)
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    Object.values(charts).forEach(c => c && c.resize());
  }
});
new ResizeObserver(() => {
  Object.values(charts).forEach(c => c && c.resize());
}).observe(document.body);
</script>
